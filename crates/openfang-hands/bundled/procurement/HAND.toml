id = "procurement"
name = "Procurement Hand"
description = "商品采购调研助手 — 搜索品牌口碑、销量、进货价、价格走势、质量报告、厂家详情，生成采购分析报告"
category = "data"
icon = "\U0001F6D2"
tools = ["shell_exec", "file_read", "file_write", "file_list", "web_fetch", "web_search", "memory_store", "memory_recall", "schedule_create", "schedule_list", "schedule_delete", "knowledge_add_entity", "knowledge_add_relation", "knowledge_query", "event_publish", "workflow_present", "canvas_present"]

